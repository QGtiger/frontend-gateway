version: '3.8'

services:
  frontend-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: frontend-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      - shared-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  shared-network:
    external: true
    name: shared-network
